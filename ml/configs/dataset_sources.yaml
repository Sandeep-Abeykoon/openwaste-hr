project:
  name: OpenWaste-HR
  dataset_plan_version: v1

storage:
  raw_data_dir: ml/data/raw
  interim_data_dir: ml/data/interim
  processed_data_dir: ml/data/processed
  local_unknown_dir: ml/data/local_unknown
  split_dir: ml/data/splits

sources:
  - name: trashnet
    planned_role: simple_closed_set_baseline
    status: not_downloaded
    expected_format: image_folders_by_class
    notes: >
      Useful as the first baseline dataset because it has simple material classes
      such as cardboard, glass, metal, paper, plastic, and trash.

  - name: globalwastedata
    planned_role: main_public_dataset_candidate
    status: not_downloaded
    expected_format: to_be_checked
    notes: >
      Candidate larger integrated dataset for stronger known-class training and
      cross-domain evaluation.

  - name: taco
    planned_role: stress_test_and_unknown_evaluation
    status: not_downloaded
    expected_format: coco_style_annotations
    notes: >
      Useful for in-the-wild litter images, clutter, and difficult contexts.
      This source may require extra preprocessing because it is not a simple
      folder-per-class classification dataset.

  - name: local_phone_images
    planned_role: local_unknown_and_active_learning
    status: not_started
    expected_format: manually_collected_images
    notes: >
      Local images will be collected using a phone camera and used for unknown
      testing, manual review, and active learning experiments.

rules:
  commit_large_images_to_git: false
  unknown_as_training_class_in_baseline: false
  require_manifest_for_every_image: true
  require_original_label_tracking: true
  require_openwaste_label_mapping: true