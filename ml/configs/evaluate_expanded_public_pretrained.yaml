project:
  name: OpenWaste-HR
  evaluation_stage: baseline_closed_set_trashnet
  version: v1

paths:
  checkpoint: ml/outputs/checkpoints/expanded_public_pretrained_v1/expanded_public_pretrained_v1_best.pt
  class_mapping_json: ml/outputs/checkpoints/expanded_public_pretrained_v1/expanded_public_pretrained_v1_class_mapping.json
  test_manifest: ml/data/splits/expanded_public_known_test_v1.csv
  taxonomy: ml/configs/taxonomy.yaml
  output_metrics_dir: ml/outputs/metrics
  output_figures_dir: ml/outputs/figures
  docs_results_dir: docs/results
  docs_figures_dir: docs/results/figures

data:
  label_column: fine_label
  image_size: 224
  batch_size: 32
  num_workers: 0
  device: auto

outputs:
  predictions_csv: expanded_public_pretrained_test_predictions_v1.csv
  summary_metrics_json: expanded_public_pretrained_eval_metrics_v1.json
  confusion_matrix_csv: expanded_public_pretrained_confusion_matrix_v1.csv
  classification_report_csv: expanded_public_pretrained_classification_report_v1.csv
  confusion_matrix_plot: expanded_public_pretrained_confusion_matrix_v1.png
  markdown_report: expanded_public_pretrained_v1_report.md





