project:
  name: OpenWaste-HR
  evaluation_stage: human_labelling_sheet
  version: v1

paths:
  active_learning_candidates_csv: ml/outputs/metrics/active_learning_candidates_v1.csv
  output_metrics_dir: ml/outputs/metrics
  docs_results_dir: docs/results

annotation:
  allowed_human_decisions:
    - known_label
    - new_unknown_class
    - mixed_waste
    - unclear_image
    - remove_sample

  allowed_fine_labels:
    - paper_cardboard
    - plastic
    - glass
    - metal
    - organic
    - e_waste_battery
    - residual
    - unknown

  allowed_coarse_labels:
    - recyclable
    - organic
    - hazardous
    - residual
    - unknown
    - manual_review

  allowed_human_confidence:
    - low
    - medium
    - high

outputs:
  human_labelling_sheet_csv: human_labelling_sheet_v1.csv
  human_labelling_instructions_md: human_labelling_instructions_v1.md
  markdown_report: human_labelling_sheet_v1_report.md