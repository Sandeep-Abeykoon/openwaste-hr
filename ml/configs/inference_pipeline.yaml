project:
  name: OpenWaste-HR
  inference_stage: single_image_inference
  version: v1

model:
  checkpoint_path: ml/outputs/checkpoints/pretrained_trashnet_v1/pretrained_trashnet_v1_best.pt
  model_name: mobilenetv3_small_100
  pretrained: false
  num_classes: 5
  image_size: 224
  class_names:
    - paper_cardboard
    - plastic
    - glass
    - metal
    - residual

labels:
  fine_to_coarse:
    paper_cardboard: recyclable
    plastic: recyclable
    glass: recyclable
    metal: recyclable
    residual: residual

policy:
  fine_confidence_threshold: 0.995
  coarse_confidence_threshold: 0.8
  coarse_margin_threshold: 0.15
  minimum_confidence_for_coarse: 0.9

outputs:
  output_metrics_dir: ml/outputs/metrics
  output_json: best_pretrained_safe_single_image_inference_result_v1.json
  output_markdown: best_pretrained_safe_single_image_inference_result_v1.md
# active_policy: best_pretrained_safe_policy_v1
