project:
  name: OpenWaste-HR
  evaluation_stage: open_set_score_reject_baseline
  version: v1

paths:
  checkpoint: ml/outputs/checkpoints/baseline_trashnet_v1/baseline_trashnet_best.pt
  val_manifest: ml/data/splits/known_val.csv
  test_manifest: ml/data/splits/known_test.csv
  output_metrics_dir: ml/outputs/metrics
  output_figures_dir: ml/outputs/figures
  docs_results_dir: docs/results
  docs_figures_dir: docs/results/figures

data:
  label_column: fine_label
  image_size: 224
  batch_size: 32
  num_workers: 0
  device: auto

score_methods:
  max_logit:
    enabled: true
    accept_direction: greater_equal
    threshold_count: 101

  energy:
    enabled: true
    accept_direction: less_equal
    temperature: 1.0
    threshold_count: 101

threshold_selection:
  min_coverage: 0.70
  selection_metric: selective_macro_f1

outputs:
  val_scores_csv: open_set_score_val_predictions_v1.csv
  test_scores_csv: open_set_score_test_predictions_v1.csv
  threshold_sweep_csv: open_set_score_threshold_sweep_v1.csv
  selected_thresholds_json: open_set_score_selected_thresholds_v1.json
  test_metrics_json: open_set_score_test_metrics_v1.json
  coverage_risk_plot: open_set_score_coverage_risk_v1.png
  score_histogram_plot: open_set_score_histogram_v1.png
  markdown_report: open_set_score_baseline_v1_report.md