project:
  name: OpenWaste-HR
  evaluation_stage: pretrained_safe_hierarchical_policy_tuning
  version: v1
paths:
  known_predictions_csv: ml/outputs/metrics/pretrained_trashnet_test_predictions_v1.csv
  local_unknown_predictions_csv: ml/outputs/metrics/local_unknown_predictions_v1.csv
  output_metrics_dir: ml/outputs/metrics
  output_figures_dir: ml/outputs/figures
  docs_results_dir: docs/results
  docs_figures_dir: docs/results/figures
labels:
  fine_to_coarse:
    paper_cardboard: recyclable
    plastic: recyclable
    glass: recyclable
    metal: recyclable
    residual: residual
search_space:
  fine_confidence_thresholds:
  - 0.9
  - 0.95
  - 0.97
  - 0.99
  - 0.995
  coarse_confidence_thresholds:
  - 0.8
  - 0.9
  - 0.95
  - 0.98
  - 0.99
  coarse_margin_thresholds:
  - 0.15
  - 0.35
  - 0.5
  - 0.65
  - 0.8
  - 0.9
  minimum_confidence_for_coarse_values:
  - 0.35
  - 0.5
  - 0.65
  - 0.8
  - 0.9
selection:
  minimum_known_decision_coverage: 0.6
  minimum_known_success_rate_over_accepted: 0.9
  objective_weights:
    unknown_manual_review_rate: 0.5
    known_success_rate_over_accepted: 0.3
    known_decision_coverage: 0.2
outputs:
  threshold_sweep_csv: pretrained_safe_hierarchical_threshold_sweep_v1.csv
  selected_policy_json: pretrained_safe_hierarchical_selected_policy_v1.json
  known_decisions_csv: pretrained_safe_hierarchical_known_test_decisions_v1.csv
  local_unknown_decisions_csv: pretrained_safe_hierarchical_local_unknown_decisions_v1.csv
  metrics_json: pretrained_safe_hierarchical_policy_metrics_v1.json
  decision_distribution_csv: pretrained_safe_hierarchical_decision_distribution_v1.csv
  tuning_plot: pretrained_safe_hierarchical_policy_tuning_v1.png
  markdown_report: pretrained_safe_hierarchical_policy_tuning_v1_report.md

# pretrained checkpoint marker: pretrained_trashnet_v1

# pretrained safe hierarchical marker: pretrained_safe_hierarchical

# checkpoint marker: ml/outputs/checkpoints/pretrained_trashnet_v1/pretrained_trashnet_v1_best.pt
