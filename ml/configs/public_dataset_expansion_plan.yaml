project:
  name: OpenWaste-HR
  stage: public_dataset_expansion_plan
  version: v1

current_completed_training:
  baseline_a:
    name: scratch_trashnet
    dataset: trashnet_style_dataset
    status: complete
  baseline_b:
    name: pretrained_trashnet
    dataset: trashnet_style_dataset
    status: complete

planned_training:
  baseline_c:
    name: pretrained_expanded_public_dataset
    status: planned
    goal: test whether larger and more realistic public waste data improves performance
  baseline_d:
    name: expanded_dataset_plus_reviewed_active_learning
    status: planned
    goal: test whether human-reviewed local samples improve the system

candidate_datasets:
  - dataset_id: realwaste
    priority: 1
    planned_role: next_image_classification_training_dataset
    expected_local_root: ml/data/raw/realwaste
    status: planned_not_downloaded
    intake_strategy: inspect_folder_labels_then_map_to_openwaste_taxonomy

  - dataset_id: taco
    priority: 2
    planned_role: future_in_the_wild_open_set_and_hierarchical_reference
    expected_local_root: ml/data/raw/taco
    status: planned_not_downloaded
    intake_strategy: inspect_annotations_then_decide_image_level_or_unknown_eval_use

openwaste_current_fine_labels:
  - paper_cardboard
  - plastic
  - glass
  - metal
  - organic
  - e_waste_battery
  - residual

mapping_roles:
  - known_train_candidate
  - known_eval_candidate
  - unknown_eval_candidate
  - future_class_candidate
  - exclude_or_review

mapping_rules:
  do_not_force_unknown_into_known_class: true
  require_manual_mapping_review: true
  keep_outside_taxonomy_as_unknown_or_future_class: true
  keep_license_notes: true

next_step:
  name: realwaste_intake_manifest_builder
  status: planned