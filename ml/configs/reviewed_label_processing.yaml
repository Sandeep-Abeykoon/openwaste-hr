project:
  name: OpenWaste-HR
  evaluation_stage: reviewed_label_processing
  version: v1

paths:
  human_labelling_sheet_csv: ml/outputs/metrics/human_labelling_sheet_v1.csv
  output_metrics_dir: ml/outputs/metrics
  docs_results_dir: docs/results

annotation:
  allowed_human_decisions:
    - known_label
    - new_unknown_class
    - mixed_waste
    - unclear_image
    - remove_sample

  allowed_fine_labels:
    - paper_cardboard
    - plastic
    - glass
    - metal
    - organic
    - e_waste_battery
    - residual
    - unknown

  allowed_coarse_labels:
    - recyclable
    - organic
    - hazardous
    - residual
    - unknown
    - manual_review

  allowed_human_confidence:
    - low
    - medium
    - high

outputs:
  reviewed_decisions_csv: reviewed_label_decisions_v1.csv
  ready_for_dataset_csv: reviewed_label_ready_for_dataset_v1.csv
  summary_json: reviewed_label_status_summary_v1.json
  markdown_report: reviewed_label_processing_v1_report.md