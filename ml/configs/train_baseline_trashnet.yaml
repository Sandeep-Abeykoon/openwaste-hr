project:
  name: OpenWaste-HR
  training_stage: baseline_closed_set_trashnet
  version: v1

paths:
  train_manifest: ml/data/splits/known_train.csv
  val_manifest: ml/data/splits/known_val.csv
  test_manifest: ml/data/splits/known_test.csv
  taxonomy: ml/configs/taxonomy.yaml
  output_checkpoint_dir: ml/outputs/checkpoints/baseline_trashnet_v1
  output_metrics_dir: ml/outputs/metrics

model:
  name: mobilenetv3_small_100
  pretrained: false
  num_classes: auto
  drop_rate: 0.1

data:
  label_column: fine_label
  image_size: 224
  num_workers: 0

training:
  seed: 42
  device: auto
  epochs: 5
  batch_size: 16
  learning_rate: 0.0003
  weight_decay: 0.01
  use_class_weights: true

outputs:
  best_checkpoint: baseline_trashnet_best.pt
  final_checkpoint: baseline_trashnet_final.pt
  class_mapping_json: baseline_trashnet_class_mapping.json
  metrics_csv: baseline_trashnet_training_metrics.csv
  test_metrics_json: baseline_trashnet_test_metrics.json