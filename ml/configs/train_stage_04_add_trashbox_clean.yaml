experiment:
  name: stage_04_add_trashbox_clean_v1
  version: v1
  description: >
    Stage 4 final combined closed-set model trained on TrashNet, RealWaste,
    Garbage V2, and TrashBox known classes using the clean 5-class OpenWaste-HR protocol.

data:
  stage_dir: ml/data/manifests/stages/stage_04_add_trashbox_clean_v1
  train_csv: ml/data/manifests/stages/stage_04_add_trashbox_clean_v1/known_train_v1.csv
  val_csv: ml/data/manifests/stages/stage_04_add_trashbox_clean_v1/known_val_v1.csv
  test_csv: ml/data/manifests/stages/stage_04_add_trashbox_clean_v1/known_test_v1.csv
  unknown_val_csv: ml/data/manifests/stages/stage_04_add_trashbox_clean_v1/unknown_val_v1.csv
  unknown_test_csv: ml/data/manifests/stages/stage_04_add_trashbox_clean_v1/unknown_test_v1.csv

labels:
  known_classes:
    - cardboard
    - glass
    - metal
    - paper
    - plastic
  num_classes: 5

model:
  backbone: mobilenet_v3_large
  pretrained: true
  dropout: 0.2

preprocessing:
  config_path: ml/configs/preprocessing.yaml
  image_size: 224

training:
  seed: 42
  epochs: 50
  batch_size: 32
  log_every_batches: 10
  learning_rate: 0.0003
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  early_stopping:
    enabled: true
    patience: 6
    monitor: val_macro_f1
    mode: max

outputs:
  output_dir: ml/outputs/stage_04_add_trashbox_clean_v1
  model_path: ml/outputs/stage_04_add_trashbox_clean_v1/best_model.pt
  metrics_path: ml/outputs/stage_04_add_trashbox_clean_v1/metrics_v1.json
  predictions_path: ml/outputs/stage_04_add_trashbox_clean_v1/predictions_v1.csv
  confusion_matrix_path: ml/outputs/stage_04_add_trashbox_clean_v1/confusion_matrix_v1.png

evaluation:
  closed_set_metrics:
    - accuracy
    - macro_f1
    - balanced_accuracy
    - confusion_matrix

  reject_option_metrics_later:
    - unknown_rejection_rate
    - auroc_known_vs_unknown
    - expected_calibration_error
    - coverage_risk_curve

notes:
  - This is the final combined known-class model.
  - Training uses the clean Stage 4 split with corrupted TrashBox images removed.
  - Known classes are cardboard, glass, metal, paper, and plastic only.
  - Textile/clothes and biological/food-organic samples remain outside known-class training.
  - After this model is trained, reject-option/open-set evaluation must be performed using unknown_val and unknown_test.
