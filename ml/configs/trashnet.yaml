project:
  name: OpenWaste-HR
  dataset_source: trashnet
  intake_version: v1

paths:
  dataset_root: ml/data/raw/trashnet/dataset-resized
  output_manifest: ml/data/splits/trashnet_manifest_v1.csv
  output_train: ml/data/splits/known_train.csv
  output_val: ml/data/splits/known_val.csv
  output_test: ml/data/splits/known_test.csv
  taxonomy: ml/configs/taxonomy.yaml

split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42

source_labels:
  cardboard:
    fine_label: paper_cardboard
    coarse_label: recyclable
  paper:
    fine_label: paper_cardboard
    coarse_label: recyclable
  plastic:
    fine_label: plastic
    coarse_label: recyclable
  glass:
    fine_label: glass
    coarse_label: recyclable
  metal:
    fine_label: metal
    coarse_label: recyclable
  trash:
    fine_label: residual
    coarse_label: residual

rules:
  source_dataset: trashnet
  is_known: true
  license_notes: "TrashNet dataset. Cite original TrashNet repository."